name: Dev Task
description: 구현 작업 또는 로직 변경 작업을 등록합니다.
title: "[Dev] "
labels: ["dev"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 구현하려는 기능 또는 변경할 로직을 적습니다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      placeholder: |
        - 대상 모듈:
        - 수정 파일/클래스:
        - 제외 범위:
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: 기준 문서
      description: 관련 하네스 문서 또는 Notion 링크를 적습니다.
      placeholder: "예: docs/product-specs/CardSystem.md"
  - type: textarea
    id: checks
    attributes:
      label: 검증 방법
      placeholder: |
        - [ ] 로컬 빌드
        - [ ] 단위 테스트
        - [ ] 플레이 테스트
        - [ ] 문서 업데이트
  - type: textarea
    id: risk
    attributes:
      label: 리스크 / 기술 부채
      description: 일정, 구현 난이도, 임시 처리 여부를 적습니다.
