name: Meeting Needed
description: 회의가 필요한 안건, 결정 대기 사항, 회의 결과 로그를 기록합니다.
title: "[Meeting] "
labels: ["meeting-needed", "feedback-needed"]
body:
  - type: textarea
    id: topic
    attributes:
      label: 회의 주제
      description: 논의해야 하는 핵심 안건을 한두 문장으로 적습니다.
      placeholder: "예: 필살기 발동 조건을 자동 승격으로 유지할지, 별도 버튼으로 분리할지 결정"
    validations:
      required: true
  - type: dropdown
    id: meeting_type
    attributes:
      label: 구분
      options:
        - 회의 필요
        - 결정 필요
        - 피드백 요청
        - 회의 결과 기록
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - 높음
        - 보통
        - 낮음
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - Phase 1
        - Phase 2
        - Phase 3
        - Phase 4
        - Phase 5
        - Backlog
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 배경 / 현재 상태
      description: 왜 회의가 필요한지, 어떤 문서나 작업과 연결되는지 적습니다.
      placeholder: |
        - 관련 시스템:
        - 현재 결정된 내용:
        - 막힌 지점:
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: 선택지
      description: 가능하면 비교할 수 있는 선택지를 적습니다.
      placeholder: |
        1. 선택지 A:
        2. 선택지 B:
        3. 보류:
  - type: textarea
    id: decision
    attributes:
      label: 결정 / 회의 결과
      description: 회의 후 확정된 결론을 적습니다. 회의 전이면 비워둬도 됩니다.
      placeholder: |
        - 결정:
        - 근거:
        - 후속 작업:
  - type: textarea
    id: links
    attributes:
      label: 관련 링크
      description: Notion, 문서, PR, 커밋, 이미지 레퍼런스 링크를 적습니다.
      placeholder: |
        - Notion:
        - 문서:
        - GitHub:
  - type: textarea
    id: checklist
    attributes:
      label: 완료 기준
      placeholder: |
        - [ ] 회의 결과가 이슈에 기록됨
        - [ ] 영향받는 문서가 업데이트됨
        - [ ] 필요한 후속 이슈가 생성됨
