name: Planning Task
description: 기획, 문서, 밸런스, UI/UX 설계 작업을 등록합니다.
title: "[Planning] "
labels: ["planning"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 작업으로 결정하거나 정리해야 하는 내용을 적습니다.
      placeholder: "예: 검사 기본 카드 5장의 역할 슬롯을 확정한다."
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - Phase 1
        - Phase 2
        - Phase 3
        - Phase 4
        - Phase 5
        - Backlog
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - 기획
        - 디자인
        - 개발
        - QA
        - 문서
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 배경 / 고민한 지점
      description: 왜 이 작업이 필요한지, 오늘 논의한 내용을 적습니다.
  - type: textarea
    id: references
    attributes:
      label: 관련 링크
      description: Notion, 문서, 커밋, 이미지 레퍼런스 링크를 적습니다.
  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      placeholder: |
        - [ ] 기준 문서에 반영됨
        - [ ] 팀 피드백 대기 또는 완료 상태로 이동됨
    validations:
      required: true
